<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HapjesWoud</title>
    
    <link rel="apple-touch-icon" href="vosje.png">
    <link rel="icon" type="image/png" href="vosje.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Sprookjesbos Kleuren & Lettertypes */
        :root {
            --achtergrond: #eef3eb; /* Heel licht mosgroen */
            --tekst: #4E342E; /* Houtbruin */
            --groen: #558B2F; /* Donker mos */
            --oranje: #D84315; /* Vos oranje */
            --hout: #8D6E63; /* Licht hout */
            --hout-donker: #5D4037;
            --wit: #ffffff;
            --perkament: #fdfaf3;
        }

        body { 
            font-family: 'Nunito', sans-serif; /* Rond en zacht lettertype */
            background-color: var(--achtergrond); 
            margin: 0; 
            padding: 0; 
            color: var(--tekst); 
            overflow-x: hidden;
            position: relative;
        }

        /* Vuurvliegjes Animatie op de achtergrond */
        .firefly {
            position: fixed;
            width: 6px; height: 6px;
            background-color: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 10px 4px rgba(255, 235, 59, 0.6);
            animation: zweef 10s infinite alternate ease-in-out;
            z-index: -1;
            opacity: 0.6;
        }
        @keyframes zweef {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) translateX(50px) scale(1.2); opacity: 0.2; }
        }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; z-index: 10; position: relative; }
        
        /* Houten Uithangbord (Titel) */
        .houten-bord-container { text-align: center; margin-bottom: 30px; margin-top: 10px; position: relative; }
        .touwtje { width: 4px; height: 30px; background-color: #3E2723; display: inline-block; margin: 0 40px; }
        .houten-bord {
            background: linear-gradient(to bottom, var(--hout), var(--hout-donker));
            border: 4px solid #3E2723;
            border-radius: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 8px 10px rgba(0,0,0,0.2);
            padding: 10px 20px;
            display: inline-block;
            position: relative;
            margin-top: -5px;
        }
        .houten-bord h1 { 
            font-family: 'Chewy', cursive; /* Het speelse lettertype */
            color: #FFF8E1; 
            margin: 0; 
            font-size: 2.5em; 
            text-shadow: 2px 2px 0px #3E2723;
            letter-spacing: 2px;
        }
        .decoratie { font-size: 1.2em; vertical-align: middle; }

        /* Headers met aangepaste SVG Pijl */
        .header-bar { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { background: none; border: none; cursor: pointer; color: var(--hout-donker); padding: 0 15px 0 0; display: flex; align-items: center; }
        .header-bar h2 { margin: 0; color: var(--groen); flex-grow: 1; text-align: left; font-family: 'Chewy', cursive; font-size: 2em; letter-spacing: 1px;}

        /* Startscherm Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .cat-card { background: var(--perkament); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 6px 0px var(--hout), 0 10px 10px rgba(0,0,0,0.1); cursor: pointer; border: 2px solid var(--hout-donker); transition: 0.1s; position: relative; top: 0; }
        .cat-card:active { top: 4px; box-shadow: 0 2px 0px var(--hout), 0 4px 5px rgba(0,0,0,0.1); }
        .cat-icon { font-size: 2.8em; margin-bottom: 5px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }
        .cat-title { font-weight: 800; color: var(--tekst); font-size: 1.1em; }

        /* Invoervelden (Perkament look) */
        input[type="text"], textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid var(--hout); border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; background: var(--perkament); color: var(--tekst); font-family: inherit; font-weight: 600; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        input[type="text"]:focus, textarea:focus { border-color: var(--groen); }

        /* Lijsten */
        .list-box { background: var(--perkament); border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(85, 139, 47, 0.08); margin-bottom: 20px; border: 1px solid rgba(141, 110, 99, 0.3); }
        .food-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 2px dashed #D7CCC8; cursor: pointer; font-size: 1.1em; font-weight: 700; }
        .food-item:last-child { border-bottom: none; }
        
        .rating-icon { font-size: 1.5em; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.2)); }

        /* Magische Knoppen */
        .beoordeling-btn { flex: 1; padding: 15px 5px; background: var(--wit); border: 2px solid var(--hout); border-radius: 15px; font-size: 1em; cursor: pointer; transition: 0.2s; color: var(--tekst); font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 4px 0 var(--hout); position: relative; top: 0; }
        .beoordeling-btn span { font-size: 1.8em; }
        
        .beoordeling-btn:active { top: 4px; box-shadow: 0 0px 0 var(--hout); }
        .beoordeling-btn.active.vies { border-color: #795548; background-color: #EFEBE9; box-shadow: 0 0px 0 #795548; top: 4px; }
        .beoordeling-btn.active.twijfel { border-color: #F57F17; background-color: #FFFDE7; box-shadow: 0 0px 0 #F57F17; top: 4px; }
        .beoordeling-btn.active.lekker { border-color: #558B2F; background-color: #F1F8E9; box-shadow: 0 0px 0 #558B2F; top: 4px; }

        .btn-save { background-color: var(--groen); color: var(--wit); width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 1.1em; font-weight: 800; cursor: pointer; margin-top: 5px; box-shadow: 0 5px 0 #33691E; position: relative; top: 0; font-family: inherit;}
        .btn-save:active { top: 5px; box-shadow: 0 0px 0 #33691E; }
        
        .hidden { display: none !important; }

        /* Geschiedenis */
        .history-item { background: var(--wit); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 0.95em; border-left: 6px solid var(--hout); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .history-item.lekker { border-left-color: #558B2F; }
        .history-item.twijfel { border-left-color: #F57F17; }
        .history-item.vies { border-left-color: #795548; }
        .history-date { font-weight: 800; color: #a1887f; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Blaadjesregen Animatie (Vervanging voor Confetti) */
        .vallend-blaadje { position: fixed; z-index: 1000; pointer-events: none; animation: val 3s linear forwards; font-size: 24px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3)); }
        @keyframes val {
            0% { transform: translateY(-50px) rotate(0deg) translateX(0px); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg) translateX(100px); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="firefly" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
<div class="firefly" style="top: 30%; left: 80%; animation-delay: 2s;"></div>
<div class="firefly" style="top: 70%; left: 15%; animation-delay: 4s;"></div>
<div class="firefly" style="top: 85%; left: 75%; animation-delay: 1s;"></div>

<div class="container">
    
    <div id="home-screen">
        <div class="houten-bord-container">
            <div style="display: flex; justify-content: center;">
                <div class="touwtje"></div><div class="touwtje"></div>
            </div>
            <div class="houten-bord">
                <h1><span class="decoratie">🌲</span> HapjesWoud <span class="decoratie">🦊</span></h1>
            </div>
        </div>
        
        <div class="grid">
            <div class="cat-card" onclick="openCategorie('Groenten')"><div class="cat-icon">🥦</div><div class="cat-title">Groenten</div></div>
            <div class="cat-card" onclick="openCategorie('Fruit')"><div class="cat-icon">🍎</div><div class="cat-title">Fruit</div></div>
            <div class="cat-card" onclick="openCategorie('Proteïne')"><div class="cat-icon">🍗</div><div class="cat-title">Proteïne</div></div>
            <div class="cat-card" onclick="openCategorie('Granen')"><div class="cat-icon">🌾</div><div class="cat-title">Granen</div></div>
            <div class="cat-card" onclick="openCategorie('Zuivel')"><div class="cat-icon">🥛</div><div class="cat-title">Zuivel</div></div>
            <div class="cat-card" onclick="openCategorie('Kruiden')"><div class="cat-icon">🌿</div><div class="cat-title">Kruiden</div></div>
            <div class="cat-card" onclick="openCategorie('Allergenen')" style="grid-column: span 2;"><div class="cat-icon">⚠️</div><div class="cat-title">Allergenen</div></div>
        </div>
    </div>

    <div id="list-screen" class="hidden">
        <div class="header-bar">
            <button class="back-btn" onclick="toonHomeScherm()">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="list-titel">Categorie</h2>
        </div>
        
        <input type="text" id="searchInput" placeholder="Zoeken in het bos..." onkeyup="filterLijst()">
        
        <div class="list-box" id="voedselLijst">
            </div>
    </div>

    <div id="detail-screen" class="hidden">
        <div class="header-bar">
            <button class="back-btn" onclick="terugNaarLijst()">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="detail-titel">Product Naam</h2>
        </div>
        
        <div class="list-box">
            <h3 style="margin-top:0; color: var(--groen); font-family: 'Chewy', cursive; font-size: 1.5em; letter-spacing: 1px;">Nieuwe smaakervaring</h3>
            <div style="display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px;">
                <button onclick="selecteerBeoordeling('vies')" id="btn-vies" class="beoordeling-btn vies"><span>🍂</span> Bah</button>
                <button onclick="selecteerBeoordeling('twijfel')" id="btn-twijfel" class="beoordeling-btn twijfel"><span>🍄</span> Mwah</button>
                <button onclick="selecteerBeoordeling('lekker')" id="btn-lekker" class="beoordeling-btn lekker"><span>🌟</span> Heerlijk</button>
            </div>
            
            <textarea id="notitieInput" rows="3" placeholder="Wat vond de kleine boskabouter ervan? (Notitie)"></textarea>
            <button class="btn-save" onclick="slaTestOp()">Bewaren in het logboek</button>
        </div>

        <div class="list-box">
            <h3 style="margin-top:0; color: var(--oranje); font-family: 'Chewy', cursive; font-size: 1.5em; letter-spacing: 1px;">Eerdere avonturen</h3>
            <div id="geschiedenisLijst">
                </div>
        </div>
    </div>

</div>

<script>
    const catIcons = { 'Groenten': '🥦', 'Fruit': '🍎', 'Proteïne': '🍗', 'Granen': '🌾', 'Zuivel': '🥛', 'Kruiden': '🌿', 'Allergenen': '⚠️' };
    const themaIconen = { 'lekker': '🌟', 'twijfel': '🍄', 'vies': '🍂' };

    // Volledige Database
    const database = [
        { id: 'v1', naam: 'Asperges', categorie: 'Groenten' }, { id: 'v2', naam: 'Bieten', categorie: 'Groenten' }, { id: 'v3', naam: 'Paprika', categorie: 'Groenten' }, { id: 'v4', naam: 'Broccoli', categorie: 'Groenten' }, { id: 'v5', naam: 'Wortels', categorie: 'Groenten' }, { id: 'v6', naam: 'Bloemkool', categorie: 'Groenten' }, { id: 'v7', naam: 'Mais', categorie: 'Groenten' }, { id: 'v8', naam: 'Komkommer', categorie: 'Groenten' }, { id: 'v9', naam: 'Aubergine', categorie: 'Groenten' }, { id: 'v10', naam: 'Sperziebonen', categorie: 'Groenten' }, { id: 'v11', naam: 'Boerenkool', categorie: 'Groenten' }, { id: 'v12', naam: 'Prei', categorie: 'Groenten' }, { id: 'v13', naam: 'Champignon', categorie: 'Groenten' }, { id: 'v14', naam: 'Pastinaak', categorie: 'Groenten' }, { id: 'v15', naam: 'Doperwten', categorie: 'Groenten' }, { id: 'v16', naam: 'Aardappel', categorie: 'Groenten' }, { id: 'v17', naam: 'Pompoen', categorie: 'Groenten' }, { id: 'v18', naam: 'Spinazie', categorie: 'Groenten' }, { id: 'v19', naam: 'Courgette', categorie: 'Groenten' }, { id: 'v20', naam: 'Zoete Aardappel', categorie: 'Groenten' }, { id: 'v21', naam: 'Tomaat', categorie: 'Groenten' },
        { id: 'f1', naam: 'Appel', categorie: 'Fruit' }, { id: 'f2', naam: 'Abrikoos', categorie: 'Fruit' }, { id: 'f3', naam: 'Avocado', categorie: 'Fruit' }, { id: 'f4', naam: 'Banaan', categorie: 'Fruit' }, { id: 'f5', naam: 'Braam', categorie: 'Fruit' }, { id: 'f6', naam: 'Bosbes', categorie: 'Fruit' }, { id: 'f7', naam: 'Meloen', categorie: 'Fruit' }, { id: 'f8', naam: 'Kers', categorie: 'Fruit' }, { id: 'f9', naam: 'Vijg', categorie: 'Fruit' }, { id: 'f10', naam: 'Druiven', categorie: 'Fruit' }, { id: 'f11', naam: 'Kiwi', categorie: 'Fruit' }, { id: 'f12', naam: 'Citroen', categorie: 'Fruit' }, { id: 'f13', naam: 'Mango', categorie: 'Fruit' }, { id: 'f14', naam: 'Nectarine', categorie: 'Fruit' }, { id: 'f15', naam: 'Sinaasappel', categorie: 'Fruit' }, { id: 'f16', naam: 'Perzik', categorie: 'Fruit' }, { id: 'f17', naam: 'Peer', categorie: 'Fruit' }, { id: 'f18', naam: 'Ananas', categorie: 'Fruit' }, { id: 'f19', naam: 'Pruim', categorie: 'Fruit' }, { id: 'f20', naam: 'Framboos', categorie: 'Fruit' }, { id: 'f21', naam: 'Aardbei', categorie: 'Fruit' }, { id: 'f22', naam: 'Watermeloen', categorie: 'Fruit' },
        { id: 'p1', naam: 'Rundvlees', categorie: 'Proteïne' }, { id: 'p2', naam: 'Zwarte bonen', categorie: 'Proteïne' }, { id: 'p3', naam: 'Chiazaad', categorie: 'Proteïne' }, { id: 'p4', naam: 'Kip', categorie: 'Proteïne' }, { id: 'p5', naam: 'Kikkererwten', categorie: 'Proteïne' }, { id: 'p6', naam: 'Eieren', categorie: 'Proteïne' }, { id: 'p7', naam: 'Lijnzaad', categorie: 'Proteïne' }, { id: 'p8', naam: 'Kidneybonen', categorie: 'Proteïne' }, { id: 'p9', naam: 'Lamsvlees', categorie: 'Proteïne' }, { id: 'p10', naam: 'Varkensvlees', categorie: 'Proteïne' }, { id: 'p11', naam: 'Zalm', categorie: 'Proteïne' }, { id: 'p12', naam: 'Tofu', categorie: 'Proteïne' }, { id: 'p13', naam: 'Tonijn', categorie: 'Proteïne' }, { id: 'p14', naam: 'Kalkoen', categorie: 'Proteïne' }, { id: 'p15', naam: 'Witte bonen', categorie: 'Proteïne' },
        { id: 'g1', naam: 'Gerst', categorie: 'Granen' }, { id: 'g2', naam: 'Brood', categorie: 'Granen' }, { id: 'g3', naam: 'Couscous', categorie: 'Granen' }, { id: 'g4', naam: 'Havermout', categorie: 'Granen' }, { id: 'g5', naam: 'Pasta', categorie: 'Granen' }, { id: 'g6', naam: 'Quinoa', categorie: 'Granen' }, { id: 'g7', naam: 'Rijst', categorie: 'Granen' }, { id: 'g8', naam: 'Tortilla', categorie: 'Granen' },
        { id: 'z1', naam: 'Boter', categorie: 'Zuivel' }, { id: 'z2', naam: 'Kaas', categorie: 'Zuivel' }, { id: 'z3', naam: 'Yoghurt', categorie: 'Zuivel' },
        { id: 'k1', naam: 'Basilicum', categorie: 'Kruiden' }, { id: 'k2', naam: 'Kaneel', categorie: 'Kruiden' }, { id: 'k3', naam: 'Knoflook', categorie: 'Kruiden' }, { id: 'k4', naam: 'Gember', categorie: 'Kruiden' }, { id: 'k5', naam: 'Munt', categorie: 'Kruiden' }, { id: 'k6', naam: 'Nootmuskaat', categorie: 'Kruiden' }, { id: 'k7', naam: 'Paprikapoeder', categorie: 'Kruiden' }, { id: 'k8', naam: 'Peper', categorie: 'Kruiden' }, { id: 'k9', naam: 'Rozemarijn', categorie: 'Kruiden' }, { id: 'k10', naam: 'Kurkuma', categorie: 'Kruiden' },
        { id: 'a1', naam: 'Koemelk', categorie: 'Allergenen' }, { id: 'a2', naam: 'Soja', categorie: 'Allergenen' }, { id: 'a3', naam: 'Eieren', categorie: 'Allergenen' }, { id: 'a4', naam: 'Noten', categorie: 'Allergenen' }, { id: 'a5', naam: 'Vis', categorie: 'Allergenen' }, { id: 'a6', naam: 'Tarwe', categorie: 'Allergenen' }, { id: 'a7', naam: 'Pinda\'s', categorie: 'Allergenen' }, { id: 'a8', naam: 'Sesam', categorie: 'Allergenen' }, { id: 'a9', naam: 'Schaaldieren', categorie: 'Allergenen' }
    ];

    let huidigeCategorie = '';
    let huidigeSelectieId = null;
    let gekozenBeoordeling = null;

    function toonHomeScherm() {
        document.getElementById('list-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
    }

    function openCategorie(catNaam) {
        huidigeCategorie = catNaam;
        document.getElementById('list-titel').innerText = catIcons[catNaam] + " " + catNaam;
        document.getElementById('searchInput').value = ''; 
        tekenLijstScherm();
        
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.add('hidden');
        document.getElementById('list-screen').classList.remove('hidden');
    }

    function terugNaarLijst() {
        tekenLijstScherm(); 
        document.getElementById('detail-screen').classList.add('hidden');
        document.getElementById('list-screen').classList.remove('hidden');
    }

    function tekenLijstScherm() {
        const zoekTerm = document.getElementById('searchInput').value.toLowerCase();
        const lijstDiv = document.getElementById('voedselLijst');
        lijstDiv.innerHTML = ''; 

        const producten = database.filter(p => p.categorie === huidigeCategorie && p.naam.toLowerCase().includes(zoekTerm));

        if (producten.length === 0) {
            lijstDiv.innerHTML = '<p style="color:#8D6E63; text-align:center; font-weight:bold;">Geen hapjes gevonden in dit deel van het bos...</p>';
            return;
        }

        let html = '';
        producten.forEach(prod => {
            const geschiedenis = haalOp(prod.id) || [];
            const laatsteTest = geschiedenis[geschiedenis.length - 1];
            let weergaveIcoon = laatsteTest ? themaIconen[laatsteTest.beoordeling] : '🐾'; // Pootafdrukje als het nog niet getest is

            html += `
                <div class="food-item" onclick="openDetail('${prod.id}', '${prod.naam}')">
                    <span>${prod.naam}</span>
                    <span class="rating-icon">${weergaveIcoon}</span>
                </div>
            `;
        });
        lijstDiv.innerHTML = html;
    }

    function filterLijst() { tekenLijstScherm(); }

    function openDetail(id, naam) {
        huidigeSelectieId = id;
        document.getElementById('detail-titel').innerText = naam;
        gekozenBeoordeling = null;
        document.getElementById('notitieInput').value = '';
        resetKnoppen();
        tekenGeschiedenis(id);

        document.getElementById('list-screen').classList.add('hidden');
        document.getElementById('detail-screen').classList.remove('hidden');
    }

    function selecteerBeoordeling(status) {
        gekozenBeoordeling = status;
        resetKnoppen();
        document.getElementById('btn-' + status).classList.add('active');
    }

    function resetKnoppen() {
        ['vies', 'twijfel', 'lekker'].forEach(k => {
            document.getElementById('btn-' + k).classList.remove('active');
        });
    }

    // Zelfgemaakte Blaadjesregen
    function startBlaadjesRegen() {
        const bladeren = ['🍃', '🍂', '🍁', '✨', '🌟'];
        for(let i=0; i<35; i++) {
            let blaadje = document.createElement('div');
            blaadje.innerText = bladeren[Math.floor(Math.random() * bladeren.length)];
            blaadje.className = 'vallend-blaadje';
            blaadje.style.left = Math.random() * 100 + 'vw';
            // Willekeurige starttijd en duur
            blaadje.style.animationDuration = (Math.random() * 2 + 2) + 's';
            blaadje.style.animationDelay = (Math.random() * 0.5) + 's';
            
            document.body.appendChild(blaadje);
            
            // Ruim het blaadje weer op als het beneden is
            setTimeout(() => { blaadje.remove(); }, 4000);
        }
    }

    function slaTestOp() {
        if (!gekozenBeoordeling) {
            alert("Kies eerst een smaakervaring!");
            return;
        }

        const notitie = document.getElementById('notitieInput').value;
        const vandaag = new Date().toLocaleDateString('nl-NL'); 

        const nieuweTest = { datum: vandaag, beoordeling: gekozenBeoordeling, notitie: notitie };

        let geschiedenis = haalOp(huidigeSelectieId) || [];
        geschiedenis.push(nieuweTest);
        localStorage.setItem('smaaksafari_' + huidigeSelectieId, JSON.stringify(geschiedenis));

        // Start onze eigen magische animatie!
        if (gekozenBeoordeling === 'lekker') {
            startBlaadjesRegen();
        }

        tekenGeschiedenis(huidigeSelectieId);
        document.getElementById('notitieInput').value = '';
        gekozenBeoordeling = null;
        resetKnoppen();
    }

    function haalOp(id) {
        const data = localStorage.getItem('smaaksafari_' + id);
        return data ? JSON.parse(data) : null;
    }

    function tekenGeschiedenis(id) {
        const div = document.getElementById('geschiedenisLijst');
        const geschiedenis = haalOp(id) || [];
        
        if (geschiedenis.length === 0) {
            div.innerHTML = "<p style='color:#a1887f; font-style:italic; font-weight: bold;'>Nog niet geproefd. Tijd voor een nieuw avontuur! 🦊</p>";
            return;
        }

        let html = '';
        geschiedenis.slice().reverse().forEach(test => {
            let labelText = test.beoordeling === 'lekker' ? 'Heerlijk' : (test.beoordeling === 'vies' ? 'Bah' : 'Mwah');
            let emoji = themaIconen[test.beoordeling];
            
            html += `
                <div class="history-item ${test.beoordeling}">
                    <div class="history-date">${test.datum}</div>
                    <strong style="font-size: 1.1em;">${emoji} ${labelText}</strong>
                    ${test.notitie ? `<p style="margin: 8px 0 0 0; color: #5D4037;">"${test.notitie}"</p>` : ''}
                </div>
            `;
        });
        div.innerHTML = html;
    }
</script>

</body>
</html>
